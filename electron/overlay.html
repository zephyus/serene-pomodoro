<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serene Guardian - 時間到了</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Noto+Sans+TC:wght@200;300;400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            cursor: default;
            user-select: none;
            background: #050a0f;
        }

        /* ── Deep Ambient Background (Heavily Blurred) ── */
        .ambient-bg {
            position: fixed;
            inset: -100px;
            z-index: 1;
            background-size: cover;
            background-position: center;
            filter: blur(80px) saturate(180%);
            opacity: 0.65;
            animation: bgBreath 20s ease-in-out infinite alternate;
        }
        @keyframes bgBreath {
            0%   { transform: scale(1.0); }
            100% { transform: scale(1.08) translate(-1%, -1%); }
        }

        /* ── Dynamic Particle Canvas ── */
        #particleCanvas {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            width: 100vw;
            height: 100vh;
        }

        /* ── High-Res Cinematic Window ── */
        .cinematic-window {
            position: relative;
            z-index: 10;
            width: 65vh;
            height: 65vh;
            max-width: 600px;
            max-height: 600px;
            border-radius: 48px;
            box-shadow: 
                0 40px 100px rgba(0,0,0,0.8),
                0 0 0 1px rgba(255,255,255,0.08) inset;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 1s ease-out;
            animation: floatWindow 15s ease-in-out infinite alternate;
        }

        @keyframes floatWindow {
            0%   { transform: translateY(0px) scale(1); }
            100% { transform: translateY(-12px) scale(1.01); }
        }

        .window-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: -2;
            transition: transform 1s ease-out;
        }

        .window-mask {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(5,10,15,0.4), rgba(5,10,15,0.2) 40%, rgba(5,10,15,0.7));
            z-index: -1;
        }

        /* ── Breathing Circle ── */
        .breathing-ring {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .ring-svg {
            position: absolute;
            inset: 0;
            transform: rotate(-90deg);
            overflow: visible;
        }

        .ring-track { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 1.5; }
        .ring-line {
            fill: none;
            stroke: rgba(255,255,255,0.9);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-dasharray: 471;
            stroke-dashoffset: 471;
            transition: stroke-dashoffset 4s ease-in-out;
        }
        .ring-glow {
            fill: none;
            stroke: rgba(255,255,255,0.6);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 471;
            stroke-dashoffset: 471;
            filter: blur(4px);
            transition: stroke-dashoffset 4s ease-in-out, opacity 2s ease;
        }

        .circle-inner {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 80%);
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 4s ease-in-out, opacity 4s ease-in-out;
        }

        .mode-focus .circle-inner { animation: breathe 4s ease-in-out infinite; }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.7; border-color: rgba(255,255,255,0.15); }
            50%       { transform: scale(1.15); opacity: 1; border-color: rgba(255,255,255,0.4); }
        }

        /* ── Text UI ── */
        .message {
            color: rgba(255,255,255,0.95);
            font-size: 2rem;
            font-weight: 200;
            letter-spacing: 0.25em;
            text-align: center;
            text-shadow: 0 4px 24px rgba(0,0,0,0.6);
            animation: fadeUp 1.2s ease-out both;
        }

        .sub-message {
            color: rgba(255,255,255,0.6);
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 0.22em;
            animation: fadeUp 1.8s ease-out both;
            height: 1.5rem;
            margin-top: 12px;
            transition: opacity 0.45s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Dismiss Button (Outside Window) ── */
        .dismiss-btn {
            position: absolute;
            bottom: 6vh;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.85);
            padding: 12px 48px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            backdrop-filter: blur(12px);
            z-index: 20;
        }
        .dismiss-btn.visible { opacity: 1; pointer-events: auto; }
        .dismiss-btn:hover {
            border-color: rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.1);
            color: #fff;
            transform: scale(1.02);
            box-shadow: 0 6px 24px rgba(0,0,0,0.4);
        }

        /* ── Focus Actions (Rest vs Wait) ── */
        .focus-actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 30px;
            z-index: 20;
            animation: fadeUp 1.5s ease-out both;
        }

        .focus-btn {
            border: none;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            cursor: pointer;
            padding: 14px 48px;
            border-radius: 40px;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            min-width: 240px;
            backdrop-filter: blur(8px);
        }

        .focus-btn:active { transform: scale(0.96); }

        .focus-btn.rest-btn {
            background: rgba(180, 240, 240, 0.15);
            color: rgba(180, 240, 240, 0.95);
            border: 1px solid rgba(180, 240, 240, 0.35);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2), 0 0 20px rgba(180, 240, 240, 0.1);
        }
        .focus-btn.rest-btn:hover {
            background: rgba(180, 240, 240, 0.25);
            border-color: rgba(180, 240, 240, 0.6);
            transform: translateY(-1px);
        }

        .focus-btn.wait-btn {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .focus-btn.wait-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.35);
            color: rgba(255, 255, 255, 0.85);
            transform: translateY(-1px);
        }

        /* ── Stretch Tip ── */
        .stretch-tip {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            text-align: center;
            padding: 0 32px;
            margin-top: 20px;
            animation: fadeUp 1.5s ease-out both;
            line-height: 1.6;
        }

        /* ── Urgency / Escalation Styles ── */
        .urgency-warning .message {
            color: rgba(255, 200, 140, 0.95);
        }
        .urgency-warning .ring-line {
            stroke: rgba(255, 180, 100, 0.9) !important;
        }
        .urgency-warning .ring-glow {
            stroke: rgba(255, 150, 70, 0.6) !important;
        }

        .urgency-critical .message {
            color: rgba(255, 150, 130, 0.95);
        }
        .urgency-critical .ring-line {
            stroke: rgba(255, 120, 100, 0.9) !important;
        }
        .urgency-critical .ring-glow {
            stroke: rgba(255, 100, 80, 0.6) !important;
        }
        .urgency-critical .cinematic-window {
            box-shadow:
                0 40px 100px rgba(0,0,0,0.8),
                0 0 0 1px rgba(255, 120, 100, 0.15) inset,
                0 0 60px rgba(255, 100, 80, 0.1);
        }
    </style>
</head>
<body>
    <div class="ambient-bg" id="ambientBg"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="cinematic-window" id="content">
        <div class="window-bg" id="windowBg"></div>
        <div class="window-mask"></div>

        <div class="breathing-ring">
            <svg class="ring-svg" width="180" height="180" viewBox="0 0 180 180">
                <circle class="ring-track" cx="90" cy="90" r="75"/>
                <circle class="ring-glow"  cx="90" cy="90" r="75" id="ringGlow"/>
                <circle class="ring-line"  cx="90" cy="90" r="75" id="ringLine"/>
            </svg>
            <div class="circle-inner" id="circleInner"></div>
        </div>

        <div class="message" id="message">時間到了</div>
        <div class="sub-message" id="sub-message">深呼吸，放鬆一下...</div>

        <div class="focus-actions" id="focusActions" style="display: none;">
            <button class="focus-btn rest-btn" id="restBtn">🌿 開始休息</button>
            <button class="focus-btn wait-btn" id="waitBtn">⏳ 再等一分鐘</button>
        </div>

        <div class="stretch-tip" id="stretchTip" style="display: none;"></div>
    </div>

    <button class="dismiss-btn" id="dismissBtn" onclick="dismissOverlay()">繼續</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode') || 'focus';
        const skipCount = parseInt(params.get('skipCount') || '0', 10);
        document.getElementById('content').classList.add(`mode-${mode}`);

        // Apply urgency classes based on skip count
        if (skipCount >= 3) {
            document.body.classList.add('urgency-critical');
        } else if (skipCount >= 1) {
            document.body.classList.add('urgency-warning');
        }

        // ── Stretch & Health Tips ──
        const stretchTips = [
            '🧍 站起來，伸展你的雙腿',
            '🔄 慢慢轉動你的脖子，釋放肩頸壓力',
            '💧 喝一口水吧，保持身體水分',
            '👁️ 閉上眼睛 10 秒，讓它們休息',
            '🙆 雙手高舉過頭，向上伸展',
            '🫁 深呼吸三次，感受空氣進入身體',
            '🪟 走到窗邊，看看遠方的風景',
            '🤸 站起來活動一下脊椎，扭轉身體',
            '🦶 踮起腳尖再放下，重複 5 次',
            '🧘 閉眼，感受自己的呼吸 10 秒',
            '💪 聳肩到耳朵旁，維持 3 秒再放鬆',
            '🚶 在房間走一小圈，讓血液流動',
        ];

        // Urgency messages based on skip count
        const urgencyMessages = {
            0: { msg: '專注結束', sub: '做得好，你值得休息一下' },
            1: { msg: '該休息了', sub: '你已經延後了一次，身體需要你' },
            2: { msg: '請休息', sub: '連續久坐對健康有害，現在就站起來' },
            3: { msg: '你必須休息', sub: '你的身體正在向你求救' },
        };

        // Setup Image Sources based on mode
        const bgMap = {
            focus: '../src/assets/bg-focus.png',
            shortBreak: '../src/assets/bg-break.png',
            longBreak: '../src/assets/bg-overlay.png'
        };
        const imgSrc = bgMap[mode] || bgMap.focus;
        
        document.getElementById('ambientBg').style.backgroundImage = `url(${imgSrc})`;
        document.getElementById('windowBg').style.backgroundImage = `url(${imgSrc})`;

        /* ── Canvas Particle Engine ── */
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset(true);
            }
            reset(randomizeY = false) {
                this.x = Math.random() * canvas.width;
                if (mode === 'longBreak') {
                    // Snow falls down
                    this.y = randomizeY ? Math.random() * canvas.height : -10;
                    this.vy = Math.random() * 0.5 + 0.2;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.color = `rgba(255, 255, 255, ${Math.random() * 0.4 + 0.2})`;
                } else if (mode === 'shortBreak') {
                    // Embers float up & drift
                    this.y = randomizeY ? Math.random() * canvas.height : canvas.height + 10;
                    this.vy = -(Math.random() * 0.8 + 0.4);
                    this.vx = (Math.random() - 0.5) * 1.5;
                    this.color = Math.random() > 0.5 
                        ? `rgba(255, 180, 100, ${Math.random() * 0.6 + 0.2})`  // Orange
                        : `rgba(255, 120, 150, ${Math.random() * 0.6 + 0.2})`; // Magenta tint
                } else {
                    // Mist/Fireflies float up very slowly
                    this.y = randomizeY ? Math.random() * canvas.height : canvas.height + 10;
                    this.vy = -(Math.random() * 0.3 + 0.1);
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.color = `rgba(255, 255, 255, ${Math.random() * 0.3 + 0.1})`;
                }
                this.size = Math.random() * 2.5 + 0.5;
                this.life = 0;
                this.maxLife = Math.random() * 200 + 100;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life++;

                if (mode === 'shortBreak') {
                    this.vx += (Math.random() - 0.5) * 0.1; // jitter for fire
                }

                if (
                    this.y < -20 || 
                    this.y > canvas.height + 20 || 
                    this.x < -20 || 
                    this.x > canvas.width + 20 ||
                    this.life > this.maxLife
                ) {
                    this.reset();
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                
                // Opacity fade in/out
                let alpha = 1;
                if (this.life < 30) alpha = this.life / 30;
                else if (this.life > this.maxLife - 30) alpha = (this.maxLife - this.life) / 30;
                ctx.globalAlpha = alpha;
                
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        const numParticles = mode === 'shortBreak' ? 60 : 40;
        for (let i = 0; i < numParticles; i++) particles.push(new Particle());

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(loop);
        }
        loop();

        /* ── Timers & Logic ── */
        const msgEl  = document.getElementById('message');
        const subEl  = document.getElementById('sub-message');
        const glow   = document.getElementById('ringGlow');
        const line   = document.getElementById('ringLine');
        const inner  = document.getElementById('circleInner');

        const CIRC = 471; // 2 * PI * 75

        function setRingProgress(pct) {
            const offset = CIRC - CIRC * pct;
            glow.style.strokeDashoffset = offset;
            line.style.strokeDashoffset = offset;
        }

        function startBreatheCycle(durationMs = 19000, initialDelay = false) {
            const breathe = () => {
                subEl.style.opacity = '0';
                setTimeout(() => { subEl.textContent = '吸氣...'; subEl.style.opacity = '1'; }, 200);
                glow.style.transition = `stroke-dashoffset 4s ease-in-out`;
                line.style.transition = `stroke-dashoffset 4s ease-in-out`;
                inner.style.transition = 'transform 4s ease-in-out, opacity 4s ease';
                setRingProgress(1);
                inner.style.transform = 'scale(1.25)';
                inner.style.opacity = '1';

                setTimeout(() => {
                    subEl.style.opacity = '0';
                    setTimeout(() => { subEl.textContent = '憋氣...'; subEl.style.opacity = '1'; }, 200);
                    glow.style.transition = 'none'; line.style.transition = 'none';
                    inner.style.transition = 'opacity 7s ease';
                    inner.style.opacity = '0.7';
                }, 4000);

                setTimeout(() => {
                    subEl.style.opacity = '0';
                    setTimeout(() => { subEl.textContent = '緩緩吐氣...'; subEl.style.opacity = '1'; }, 200);
                    glow.style.transition = `stroke-dashoffset 8s ease-in-out`;
                    line.style.transition = `stroke-dashoffset 8s ease-in-out`;
                    inner.style.transition = 'transform 8s ease-in-out, opacity 8s ease';
                    setRingProgress(0.05);
                    inner.style.transform = 'scale(1)';
                    inner.style.opacity = '0.3';
                }, 11000);
            };

            if (initialDelay) {
                setTimeout(breathe, 100);
            } else {
                breathe();
            }
            return setInterval(breathe, durationMs);
        }

        if (mode === 'focus') {
            // Get urgency level message
            const urgency = urgencyMessages[Math.min(skipCount, 3)];
            msgEl.textContent = urgency.msg;
            subEl.textContent = urgency.sub;
            setRingProgress(1);
            glow.style.transition = 'none';
            line.style.transition = 'none';
            line.style.stroke = 'rgba(255, 230, 200, 0.9)';
            glow.style.stroke = 'rgba(255, 200, 150, 0.6)';

            const focusActions = document.getElementById('focusActions');
            const restBtn = document.getElementById('restBtn');
            const waitBtn = document.getElementById('waitBtn');
            focusActions.style.display = 'flex';

            // Hide wait button if skip count >= 3 (forced rest)
            if (skipCount >= 3) {
                waitBtn.style.display = 'none';
            }

            let countdown = 3;
            restBtn.textContent = `🌿 開始休息 (${countdown}s)`;

            const startRestTakeover = () => {
                focusActions.style.display = 'none';
                msgEl.textContent = '休息一下';

                // Show random stretch tip
                const stretchTip = document.getElementById('stretchTip');
                const tip = stretchTips[Math.floor(Math.random() * stretchTips.length)];
                stretchTip.textContent = tip;
                stretchTip.style.display = 'block';
                subEl.textContent = '';

                // After 3 seconds, start breathing cycle
                setTimeout(() => {
                    stretchTip.style.display = 'none';
                    // Color transition to cool
                    line.style.stroke = 'rgba(210, 230, 255, 0.9)';
                    glow.style.stroke = 'rgba(180, 200, 255, 0.6)';
                    startBreatheCycle(19000, true);
                }, 3000);

                setTimeout(() => {
                    if (window.overlayAPI?.sendAction) window.overlayAPI.sendAction('rest-complete');
                    dismissOverlay();
                }, 10000); // 10 second forced rest
            };

            const focusInterval = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(focusInterval);
                    startRestTakeover();
                } else {
                    restBtn.textContent = `🌿 開始休息 (${countdown}s)`;
                }
            }, 1000);

            restBtn.onclick = () => {
                clearInterval(focusInterval);
                startRestTakeover();
            };

            waitBtn.onclick = () => {
                clearInterval(focusInterval);
                if (window.overlayAPI?.sendAction) window.overlayAPI.sendAction('wait-one-minute');
                dismissOverlay();
            };

        } else {
            msgEl.textContent = mode === 'shortBreak' ? '短休息結束' : '長休息結束';
            line.style.stroke = 'rgba(210, 230, 255, 0.9)';
            glow.style.stroke = 'rgba(180, 200, 255, 0.6)';

            startBreatheCycle();

            setTimeout(() => {
                document.getElementById('dismissBtn').classList.add('visible');
            }, 3000);
        }

        function dismissOverlay() {
            if (window.overlayAPI?.closeOverlay) window.overlayAPI.closeOverlay();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const btn = document.getElementById('dismissBtn');
                if (btn.classList.contains('visible')) dismissOverlay();
            }
        });

        // 3D Parallax effect on the window based on mouse moving
        document.addEventListener('mousemove', (e) => {
            const win = document.getElementById('content');
            const x = (e.clientX / window.innerWidth - 0.5) * 20; 
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            win.style.transform = `translate(${x}px, ${y}px) rotateX(${-y*0.3}deg) rotateY(${x*0.3}deg)`;
            
            const bg = document.getElementById('windowBg');
            bg.style.transform = `scale(1.05) translate(${-x*0.8}px, ${-y*0.8}px)`;
        });
    </script>
</body>
</html>
