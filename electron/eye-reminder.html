<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20-20-20 護眼提醒</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Noto+Sans+TC:wght@200;300;400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: transparent;
            cursor: default;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reminder-card {
            width: 320px;
            padding: 28px 32px;
            border-radius: 24px;
            background: rgba(15, 25, 40, 0.85);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 0 40px rgba(100, 200, 255, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: slideIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
            position: relative;
            overflow: hidden;
        }

        .reminder-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(100, 200, 255, 0.4), transparent);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .fade-out {
            animation: slideOut 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideOut {
            to {
                opacity: 0;
                transform: translateY(10px) scale(0.97);
            }
        }

        /* ── Eye Icon with Ring ── */
        .eye-ring {
            position: relative;
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring-svg {
            position: absolute;
            inset: 0;
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.08);
            stroke-width: 2;
        }

        .ring-progress {
            fill: none;
            stroke: rgba(100, 200, 255, 0.8);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-dasharray: 188.5; /* 2 * PI * 30 */
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 4px rgba(100, 200, 255, 0.4));
        }

        .eye-icon {
            font-size: 28px;
            filter: drop-shadow(0 2px 8px rgba(100, 200, 255, 0.3));
            animation: eyePulse 3s ease-in-out infinite;
        }

        @keyframes eyePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* ── Text ── */
        .reminder-title {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.05rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-align: center;
        }

        .reminder-sub {
            color: rgba(100, 200, 255, 0.7);
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            text-align: center;
        }

        .countdown-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            font-weight: 200;
            letter-spacing: 0.1em;
            font-variant-numeric: tabular-nums;
        }

        /* ── Completion State ── */
        .complete .eye-icon {
            animation: none;
        }
        .complete .reminder-title {
            color: rgba(100, 230, 160, 0.95);
        }
        .complete .ring-progress {
            stroke: rgba(100, 230, 160, 0.8);
            filter: drop-shadow(0 0 4px rgba(100, 230, 160, 0.4));
        }
    </style>
</head>
<body>
    <div class="reminder-card" id="card">
        <div class="eye-ring">
            <svg class="ring-svg" width="72" height="72" viewBox="0 0 72 72">
                <circle class="ring-bg" cx="36" cy="36" r="30"/>
                <circle class="ring-progress" cx="36" cy="36" r="30" id="ringProgress"/>
            </svg>
            <div class="eye-icon" id="eyeIcon">👁️</div>
        </div>
        <div class="reminder-title" id="title">看向遠方 20 秒</div>
        <div class="reminder-sub">讓眼睛休息一下</div>
        <div class="countdown-text" id="countdown">20s</div>
    </div>

    <script>
        const DURATION = 20; // seconds
        const CIRC = 188.5; // 2 * PI * 30
        const ring = document.getElementById('ringProgress');
        const countdownEl = document.getElementById('countdown');
        const card = document.getElementById('card');
        const titleEl = document.getElementById('title');
        const eyeIcon = document.getElementById('eyeIcon');

        let remaining = DURATION;

        const interval = setInterval(() => {
            remaining--;
            
            // Update ring progress (counting down)
            const progress = remaining / DURATION;
            ring.style.strokeDashoffset = CIRC * (1 - progress);
            
            // Update countdown text
            countdownEl.textContent = `${remaining}s`;

            if (remaining <= 0) {
                clearInterval(interval);
                // Show completion
                card.classList.add('complete');
                titleEl.textContent = '做得好 ✨';
                eyeIcon.textContent = '✅';
                countdownEl.textContent = '';

                // Fade out after 2 seconds
                setTimeout(() => {
                    card.classList.add('fade-out');
                    setTimeout(() => {
                        if (window.eyeReminderAPI?.close) {
                            window.eyeReminderAPI.close();
                        }
                    }, 600);
                }, 1500);
            }
        }, 1000);
    </script>
</body>
</html>
